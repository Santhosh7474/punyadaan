<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get PunyaDaan</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #24963F;
            --secondary: #E89344;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e9f0e6 0%, #f6f8fd 100%);
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 20s infinite ease-in-out alternate;
        }
        
        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(36, 150, 63, 0.2);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(232, 147, 68, 0.15);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 50px) scale(1.1); }
            100% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Glassmorphism Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.05),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            z-index: 1;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin: 0 auto 32px;
            box-shadow: 0 16px 32px rgba(36, 150, 63, 0.2);
            background: #fff;
            padding: 4px;
            position: relative;
        }
        
        .app-icon img {
            width: 100%;
            height: 100%;
            border-radius: 24px;
            object-fit: cover;
        }

        h1 {
            color: #1a1a1a;
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        p {
            color: #555;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 18px 32px;
            border-radius: 100px;
            font-size: 18px;
            font-weight: 800;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 24px rgba(36, 150, 63, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 32px rgba(36, 150, 63, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: rgba(36, 150, 63, 0.05);
            transform: translateY(-2px);
        }

        .icon-arr {
            margin-left: 8px;
            transition: transform 0.3s ease;
        }

        .btn:hover .icon-arr {
            transform: translateX(4px);
        }

        .verified-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 32px;
            font-size: 14px;
            color: #888;
            font-weight: 600;
        }

    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">
        <div class="app-icon">
            <!-- Using the local app icon we copied -->
            <img src="/icon.png" alt="PunyaDaan App" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
        </div>
        
        <h1>Open deeply in PunyaDaan</h1>
        <p>You've discovered an organization! To view its verified details and seamlessly donate, please open or download the official app.</p>
        
        <div class="btn-container">
            <a href="#" class="btn btn-primary" onclick="alert('This will redirect to the Google Play Store!')">
                Download the App
                <svg class="icon-arr" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </a>
            <a href="#" class="btn btn-secondary" onclick="alert('When dynamic link retry finishes, this forces an app open check!')">
                I already have it installed
            </a>
        </div>
        
        <div class="verified-badge">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#24963F" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            100% Secure & Verified
        </div>
    </div>
</body>
</html>
